<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYOTA FUNDS - Delivery</title>

<style>
body{
    margin:0;
    padding:15px;
    background:#0b6b0b;
    font-family:Arial,sans-serif;
}

.container{
    max-width:420px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
}

h2{
    text-align:center;
    color:green;
}

.option{
    border:2px solid #1565c0;
    border-radius:8px;
    padding:15px;
    margin-top:15px;
    cursor:pointer;
}

.option.selected{
    background:#1565c0;
    color:white;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
}
</style>

</head>
<body>

<div class="container">
<div class="card">

<h2>🎉 Payment Received Successfully</h2>

<p>Select your preferred delivery method.</p>

<div class="option" onclick="selectOption(this,'mpesa')">
<b>M-PESA Delivery</b><br>
Delivery Charge: <b>Ksh 1</b>
</div>

<div class="option" onclick="selectOption(this,'bank')">
<b>Bank Delivery</b><br>
Delivery Charge: <b>Ksh 1</b>
</div>

<button onclick="continuePayment()">Continue</button>

</div>
</div>

<script>
let deliveryMethod = "";

function selectOption(element, method){

document.querySelectorAll(".option").forEach(opt=>{
opt.classList.remove("selected");
});

element.classList.add("selected");
deliveryMethod = method;

localStorage.setItem("deliveryMethod", method);
}

function continuePayment(){

if(deliveryMethod==""){
alert("Please select a delivery method.");
return;
}

window.location.href="delivery-payment.html";

}
</script>

</body>
</html>
