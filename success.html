<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NYOTA FUNDS</title>

<style>

body{
    margin:0;
    padding:15px;
    background:#0b6b0b;
    font-family:Arial,sans-serif;
}

.container{
    max-width:420px;
    margin:auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    text-align:center;
}

h1{
    color:#1565c0;
    font-size:24px;
}

p{
    font-size:16px;
    line-height:1.6;
}

.success{
    font-size:60px;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="success">✅</div>

<h1>Payment Successful</h1>

<p>
Congratulations <b><span id="name"></span></b>!
</p>

<p>
Your payment has been received successfully.
</p>

<p>
Your NYOTA FUNDS request has been submitted successfully.
</p>

<p>
Our team is verifying your application. You will receive further communication after verification is complete.
</p>

<button onclick="finish()">
Finish
</button>

</div>

</div>

<script>

let applicant = localStorage.getItem("applicantName");

document.getElementById("name").innerHTML =
applicant || "Applicant";

function finish(){

alert("Thank you for choosing NYOTA FUNDS.");

}

</script>

</body>
</html>
